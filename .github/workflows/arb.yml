name: ARB Scanner

on:
  schedule:
    # Todos los dias entre semana (L-V) a las 20:30 hora España (UTC+2 = 18:30 UTC)
    - cron: '30 18 * * 1,2,3,4,5'

    # Sabados y domingos — 4 escaneos al dia
    # 13:30 España = 11:30 UTC
    - cron: '30 11 * * 6,0'
    # 15:45 España = 13:45 UTC
    - cron: '45 13 * * 6,0'
    # 18:00 España = 16:00 UTC
    - cron: '0 16 * * 6,0'
    # 20:30 España = 18:30 UTC
    - cron: '30 18 * * 6,0'

  # Permite ejecutarlo manualmente desde GitHub si quieres
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar scanner de arbitraje
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scanner.py
